<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MT Dashboard V1</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      background:#020b2d;
      color:white;
      font-family:Arial,sans-serif;
    }
  </style>
</head>

<body class="p-6">

<h1 class="text-5xl font-bold text-blue-400 mb-2">
  MT INSPECTION
</h1>

<p class="text-gray-300 mb-8">
  Manufacturing Analytics Dashboard
</p>

<div class="grid grid-cols-4 gap-4 mb-8">

  <div class="bg-[#07153a] p-6 rounded-3xl border border-blue-900">
    <div class="text-gray-400">Total Production</div>
    <div id="totalProduction" class="text-5xl font-bold mt-2">0</div>
  </div>

  <div class="bg-[#07153a] p-6 rounded-3xl border border-blue-900">
    <div class="text-gray-400">Average / Day</div>
    <div id="avgDay" class="text-5xl font-bold mt-2">0</div>
  </div>

  <div class="bg-[#07153a] p-6 rounded-3xl border border-blue-900">
    <div class="text-gray-400">Top Person</div>
    <div id="topPerson" class="text-3xl font-bold mt-2">-</div>
  </div>

  <div class="bg-[#07153a] p-6 rounded-3xl border border-blue-900">
    <div class="text-gray-400">Top Machine</div>
    <div id="topMachine" class="text-3xl font-bold mt-2">-</div>
  </div>

</div>

<div class="grid grid-cols-2 gap-4">

  <div class="bg-[#07153a] p-6 rounded-3xl border border-blue-900">
    <h2 class="text-2xl font-bold mb-4">Last Five Week</h2>
    <canvas id="weekChart"></canvas>
  </div>

  <div class="bg-[#07153a] p-6 rounded-3xl border border-blue-900">
    <h2 class="text-2xl font-bold mb-4">Top 10 Part</h2>
    <canvas id="partChart"></canvas>
  </div>

  <div class="bg-[#07153a] p-6 rounded-3xl border border-blue-900">
    <h2 class="text-2xl font-bold mb-4">By Person</h2>
    <canvas id="personChart"></canvas>
  </div>

  <div class="bg-[#07153a] p-6 rounded-3xl border border-blue-900">
    <h2 class="text-2xl font-bold mb-4">By Machine</h2>
    <canvas id="machineChart"></canvas>
  </div>

</div>

<script>

async function loadExcel() {

  const response = await fetch(
    'https://opensheet.elk.sh/107zcI7KBOe0pAL0UchHiOgqDsQVaHrc9nc9HIl1h-fY/Sheet1',
    {
      cache: 'no-store'
    }
  )

  return await response.json()
}

function sumBy(data, key){
  const map = {}

  data.forEach(row => {
    const name = row[key] || 'Unknown'
    const qty = Number(row.Qty || 0)

    map[name] = (map[name] || 0) + qty
  })

  return map
}

async function initDashboard(){

  const rawData = await loadExcel()

  const total = rawData.reduce((a,b)=>a+Number(b.Qty || 0),0)

  document.getElementById('totalProduction').innerText =
    total.toLocaleString()

  const days = [...new Set(rawData.map(x=>x.Date))].length || 1

  document.getElementById('avgDay').innerText =
    Math.round(total/days)

  const personMap = sumBy(rawData,'Person')
  const machineMap = sumBy(rawData,'Machine')
  const weekMap = sumBy(rawData,'Week')
  const partMap = sumBy(rawData,'Part')

  const topPerson =
    Object.entries(personMap).sort((a,b)=>b[1]-a[1])[0]

  const topMachine =
    Object.entries(machineMap).sort((a,b)=>b[1]-a[1])[0]

  document.getElementById('topPerson').innerText =
    topPerson ? topPerson[0] : '-'

  document.getElementById('topMachine').innerText =
    topMachine ? topMachine[0] : '-'

  new Chart(document.getElementById('weekChart'),{
    type:'bar',
    data:{
      labels:Object.keys(weekMap).slice(-5),
      datasets:[{
        data:Object.values(weekMap).slice(-5)
      }]
    }
  })

  const topParts =
    Object.entries(partMap)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,10)

  new Chart(document.getElementById('partChart'),{
    type:'bar',
    data:{
      labels:topParts.map(x=>x[0]),
      datasets:[{
        data:topParts.map(x=>x[1])
      }]
    }
  })

  new Chart(document.getElementById('personChart'),{
    type:'bar',
    data:{
      labels:Object.keys(personMap),
      datasets:[{
        data:Object.values(personMap)
      }]
    }
  })

  new Chart(document.getElementById('machineChart'),{
    type:'bar',
    data:{
      labels:Object.keys(machineMap),
      datasets:[{
        data:Object.values(machineMap)
      }]
    }
  })

}

initDashboard()

setInterval(()=>{
  location.reload()
},300000)

</script>

</body>
</html>
